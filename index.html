<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>水果消消乐</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <section class="hero panel">
      <div>
        <p class="eyebrow">GitHub Pages 演示</p>
        <h1>水果消消乐</h1>
        <p class="subtitle">交换相邻水果，连成 3 个及以上即可消除。支持分数、连击、计步与手机端优化。</p>
      </div>
      <div class="hero-actions">
        <button id="newGameBtn" class="primary">新开一局</button>
      </div>
    </section>

    <section class="layout">
      <section class="board-panel panel">
        <div class="stats">
          <div><span class="label">分数</span><strong id="score">0</strong></div>
          <div><span class="label">步数</span><strong id="moves">20</strong></div>
          <div><span class="label">连击</span><strong id="combo">0</strong></div>
          <div><span class="label">目标</span><strong id="goal">2500</strong></div>
        </div>
        <div id="board" class="board" aria-label="水果棋盘"></div>
      </section>

      <aside class="sidebar">
        <section class="panel card">
          <h3>玩法</h3>
          <ul>
            <li>点击两个相邻水果进行交换</li>
            <li>3 连消除得分，4 连/5 连得分更高</li>
            <li>步数用完前达到目标分数即可获胜</li>
          </ul>
        </section>
        <section class="panel card">
          <h3>状态</h3>
          <p id="statusText">准备开始，来一局吧 🍓</p>
        </section>
      </aside>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
